<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Asistente Pro Final</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Librería para Escaneo QR -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <!-- Librería para Generación QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700;900&display=swap');
        :root { --primary: #4f46e5; --success: #22c55e; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Urbanist', sans-serif; background-color: var(--bg); margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0,0,0,0.05); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #reader { border: none !important; border-radius: 48px; overflow: hidden; background: #0f172a; position: relative; }
        #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }

        @media print {
            .no-print { display: none !important; }
            .app-container { max-width: 100% !important; box-shadow: none !important; }
            .print-grid { display: grid !important; grid-template-cols: repeat(3, 1fr) !important; gap: 10px !important; }
        }

        input[type="date"] { position: relative; }
        input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent; bottom: 0; color: transparent; cursor: pointer; height: auto; left: 0; position: absolute; right: 0; top: 0; width: auto;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyCNPHo0Vu7yLAdY3r4YoosWxAoHsSghkuo",
            authDomain: "assistant-day-pro.firebaseapp.com",
            projectId: "assistant-day-pro",
            storageBucket: "assistant-day-pro.firebasestorage.app",
            messagingSenderId: "717751256878",
            appId: "1:717751256878:web:680a9bc9464b9330301cbf"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'assistant-day-pro-v2';
        const GS_API_URL = "https://script.google.com/macros/s/AKfycbyJZab9PoZGaDBQn7jK6SO_73sZhkbz_vBjvHGwYvrJG0RW88TuAW9xhG1XLB-vq8xs/exec";

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.firestore();

        db.enablePersistence().catch(() => console.log("Persistencia no disponible"));

        const DAYS_ES = [
            { id: 0, label: 'Domingo' }, { id: 1, label: 'Lunes' }, { id: 2, label: 'Martes' },
            { id: 3, label: 'Miércoles' }, { id: 4, label: 'Jueves' }, { id: 5, label: 'Viernes' },
            { id: 6, label: 'Sábado' }
        ];
        const MONTHS_ES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        const QRCodeLocal = ({ value, size = 150 }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                if (window.QRious) new QRious({ element: canvasRef.current, value: value, size: size, level: 'M' });
            }, [value, size]);
            return <canvas ref={canvasRef} className="rounded-2xl shadow-sm bg-white p-2" />;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [screen, setScreen] = useState('home');
            const [courses, setCourses] = useState([]);
            const [records, setRecords] = useState([]);
            const [assignments, setAssignments] = useState([]);
            const [deliveries, setDeliveries] = useState([]);
            const [selectedCourse, setSelectedCourse] = useState(null);
            const [selectedTP, setSelectedTP] = useState(null);
            const [sessionAttendance, setSessionAttendance] = useState([]);
            const [reportTab, setReportTab] = useState('general');
            const [toast, setToast] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [isOffline, setIsOffline] = useState(!navigator.onLine);
            const [cameraActive, setCameraActive] = useState(false);
            
            const qrScannerRef = useRef(null);
            const lastProcessedRef = useRef(null); 
            const processedNamesInSession = useRef(new Set());

            const [fCourse, setFCourse] = useState({ name: '', school: '', students: '', schedule: {} });
            const [fTP, setFTP] = useState({ name: '', startDate: '', endDate: '' });

            useEffect(() => {
                const handleOnline = () => { setIsOffline(false); showToast("Conexión restaurada", "success"); };
                const handleOffline = () => { setIsOffline(true); showToast("Modo Offline", "info"); };
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => { window.removeEventListener('online', handleOnline); window.removeEventListener('offline', handleOffline); };
            }, []);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { console.error(e); }
                    setLoading(false);
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(u => setUser(u));
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const colBase = db.collection('artifacts').doc(appId).collection('public').doc('data');
                const unsubC = colBase.collection('courses').onSnapshot(snap => setCourses(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubA = colBase.collection('attendance').onSnapshot(snap => setRecords(snap.docs.map(d => d.data())));
                const unsubAs = colBase.collection('assignments').onSnapshot(snap => setAssignments(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubD = colBase.collection('deliveries').onSnapshot(snap => setDeliveries(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                return () => { unsubC(); unsubA(); unsubAs(); unsubD(); };
            }, [user]);

            const showToast = (msg, type = 'success') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            };

            const speak = (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'es-ES';
                    if (window.speechSynthesis.paused) window.speechSynthesis.resume();
                    window.speechSynthesis.speak(utterance);
                }
            };

            const unlockVoice = () => {
                if ('speechSynthesis' in window) {
                    const silent = new SpeechSynthesisUtterance("");
                    silent.volume = 0;
                    window.speechSynthesis.speak(silent);
                }
            };

            const todaySummary = useMemo(() => {
                const today = new Date().toISOString().split('T')[0];
                const todayRecs = records.filter(r => r.date === today);
                return {
                    p: todayRecs.filter(r => r.status.includes('Presente')).length,
                    a: todayRecs.filter(r => r.status === 'Ausente').length
                };
            }, [records]);

            const reportStats = useMemo(() => {
                if (!selectedCourse) return [];
                const courseRecs = records.filter(r => r.course === selectedCourse.name);
                const courseAssignments = assignments.filter(a => a.courseId === selectedCourse.id);
                
                return selectedCourse.students.map(name => {
                    const studentRecs = courseRecs.filter(r => r.name === name);
                    const p = studentRecs.filter(r => r.status === 'Presente').length;
                    const t = studentRecs.filter(r => r.status === 'Presente con retraso').length;
                    const a = studentRecs.filter(r => r.status === 'Ausente').length;
                    const totalAtt = p + t + a;
                    const attPerc = totalAtt === 0 ? 0 : Math.round(((p + t) / totalAtt) * 100);
                    
                    const monthly = {}; const yearly = {};
                    studentRecs.forEach(r => {
                        const d = new Date(r.date); const mKey = d.getMonth(); const yKey = d.getFullYear();
                        if(!monthly[mKey]) monthly[mKey] = { p: 0, t: 0, a: 0 };
                        if(!yearly[yKey]) yearly[yKey] = { p: 0, t: 0, a: 0 };
                        if(r.status === 'Presente') { monthly[mKey].p++; yearly[yKey].p++; }
                        else if(r.status === 'Presente con retraso') { monthly[mKey].t++; yearly[yKey].t++; }
                        else { monthly[mKey].a++; yearly[yKey].a++; }
                    });

                    const studentDeliveries = deliveries.filter(d => d.studentName === name && courseAssignments.some(a => a.id === d.tpId));
                    const deliveredOK = studentDeliveries.filter(d => d.status === 'Entregado').length;
                    const deliveredLate = studentDeliveries.filter(d => d.status === 'Fuera de Término').length;
                    const totalDelivered = deliveredOK + deliveredLate;
                    const tpPerc = courseAssignments.length === 0 ? 0 : Math.round((totalDelivered / courseAssignments.length) * 100);

                    return { name, p, t, a, attPerc, monthly, yearly, deliveredOK, deliveredLate, tpPerc, totalAssignments: courseAssignments.length };
                });
            }, [records, assignments, deliveries, selectedCourse]);

            const handleBack = () => {
                if (qrScannerRef.current) { 
                    try { qrScannerRef.current.stop(); qrScannerRef.current = null; } catch (e) {} 
                }
                setScreen('home'); setSelectedTP(null); setSelectedCourse(null); setSessionAttendance([]); 
                setIsSaving(false); setCameraActive(false);
                setFCourse({ name: '', school: '', students: '', schedule: {} }); 
                setFTP({ name: '', startDate: '', endDate: '' });
                processedNamesInSession.current.clear();
            };

            const clearAttendanceHistory = async () => {
                if (!confirm("⚠️ ¿BORRAR TODO EL HISTORIAL? Esta acción no se puede deshacer.")) return;
                setIsSaving(true);
                try {
                    const col = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('attendance');
                    const snapshot = await col.get();
                    const batch = db.batch();
                    snapshot.docs.forEach(doc => batch.delete(doc.ref));
                    await batch.commit();
                    showToast("Historial borrado");
                } catch (e) {
                    showToast("Error al borrar", "error");
                } finally {
                    setIsSaving(false);
                }
            };

            const handleScan = (decodedText) => {
                const nowTime = Date.now();
                if (lastProcessedRef.current && (nowTime - lastProcessedRef.current < 2500)) return;
                lastProcessedRef.current = nowTime;

                let cleanName = decodedText.trim().toUpperCase().replace(/[\u200B-\u200D\uFEFF]/g, '');
                if (!selectedCourse.students.some(s => s === cleanName)) {
                    const match = selectedCourse.students.find(s => cleanName.includes(s) || s.includes(cleanName));
                    if (match) cleanName = match;
                    else return showToast(`No encontrado: ${cleanName}`, "error");
                }

                if (processedNamesInSession.current.has(cleanName)) { 
                    speak("Ya registrado"); 
                    return showToast(`${cleanName}: YA REGISTRADO`, "error"); 
                }

                processedNamesInSession.current.add(cleanName);
                const now = new Date(); const todayDay = now.getDay(); let status = 'Presente';
                
                if (selectedCourse.schedule && selectedCourse.schedule[todayDay]) {
                    const [h, m] = selectedCourse.schedule[todayDay].split(':').map(Number);
                    const limit = new Date(); limit.setHours(h, m + 10, 0); 
                    if (now > limit) status = 'Presente con retraso';
                }
                
                speak(cleanName);
                setSessionAttendance(prev => [...prev, { name: cleanName, course: selectedCourse.name, school: selectedCourse.school, date: now.toISOString().split('T')[0], time: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), status, type: 'Asistencia' }]);
                showToast(`${cleanName} OK`, "success");
            };

            const startScanner = async () => {
                const readerElem = document.getElementById("reader");
                if (!readerElem) return;
                try {
                    const html5QrCode = new Html5Qrcode("reader");
                    qrScannerRef.current = html5QrCode;
                    await html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => handleScan(text));
                    setCameraActive(true);
                } catch (err) {
                    try {
                        await qrScannerRef.current.start({ facingMode: "user" }, { fps: 15, qrbox: 250 }, (text) => handleScan(text));
                        setCameraActive(true);
                    } catch (e) { showToast("Error de cámara", "error"); }
                }
            };

            useEffect(() => {
                if (screen === 'asist-run' && selectedCourse) {
                    const timer = setTimeout(startScanner, 1000);
                    return () => clearTimeout(timer);
                }
            }, [screen, selectedCourse]);

            const finalizeAsistencia = async () => {
                if (sessionAttendance.length === 0) return showToast("No hay escaneos", "error");
                setIsSaving(true);
                const path = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('attendance');
                const today = new Date().toISOString().split('T')[0];
                try {
                    const snapshot = await path.get();
                    const batch = db.batch();
                    snapshot.docs.forEach(doc => {
                        const d = doc.data();
                        if (d.course === selectedCourse.name && d.date === today) batch.delete(doc.ref);
                    });
                    const ausentes = selectedCourse.students.filter(n => !sessionAttendance.find(s => s.name === n)).map(n => ({ 
                        name: n, course: selectedCourse.name, school: selectedCourse.school, date: today, status: 'Ausente', time: '--:--', type: 'Asistencia' 
                    }));
                    const allRecords = [...sessionAttendance, ...ausentes];
                    allRecords.forEach(rec => { const docRef = path.doc(); batch.set(docRef, rec); });
                    await batch.commit();
                    if (GS_API_URL.startsWith("http") && navigator.onLine) {
                        fetch(GS_API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "attendance_bulk", payload: allRecords }) });
                    }
                    showToast("✓ Jornada Finalizada");
                    setTimeout(handleBack, 500);
                } catch (e) { showToast("Error", "error"); setIsSaving(false); }
            };

            if (loading) return <div className="flex h-screen items-center justify-center bg-indigo-700 text-white font-black uppercase text-xs animate-pulse italic">Cargando...</div>;

            return (
                <div className="app-container">
                    {toast && (
                        <div className={`fixed top-10 left-1/2 -translate-x-1/2 z-[100] px-6 py-4 rounded-3xl shadow-2xl animate-in font-black text-[10px] uppercase flex items-center gap-3 border ${toast.type === 'success' ? 'bg-green-500 text-white border-green-400' : 'bg-indigo-600 text-white border-indigo-500'}`}>
                            {toast.msg}
                        </div>
                    )}

                    {screen !== 'home' && (
                        <div className="bg-indigo-700 text-white p-6 pb-12 rounded-b-[40px] shadow-lg sticky top-0 z-50 flex items-center no-print">
                            <button onClick={handleBack} className="p-2 bg-white/10 rounded-full"><i data-lucide="chevron-left"></i></button>
                            <h1 className="flex-1 text-center font-black uppercase text-[10px] tracking-widest italic truncate px-4">
                                {screen === 'manage' ? 'Gestionar' : screen === 'asist-run' ? selectedCourse?.name : screen === 'report-view' ? 'Reportes' : screen === 'qr-gen' ? 'Credenciales' : screen === 'tp-check' ? 'Entregas' : 'Asistente'}
                            </h1>
                            <div className="w-10"></div>
                        </div>
                    )}

                    <div className="flex-1 overflow-y-auto scrollbar-hide">
                        {screen === 'home' && (
                            <div className="animate-in pb-10 text-center">
                                <div className="bg-indigo-700 text-white p-10 pb-20 rounded-b-[50px] text-center shadow-xl relative overflow-hidden">
                                    <div className="absolute top-0 right-0 -mr-10 -mt-10 w-48 h-48 bg-white/10 rounded-full blur-3xl"></div>
                                    <p className="text-indigo-200 text-[10px] font-black uppercase tracking-[0.5em] mb-2">Panel Docente</p>
                                    <h1 className="text-5xl font-black uppercase italic tracking-tighter leading-none">Assistant Day</h1>
                                </div>
                                <div className="px-6 -mt-14 grid grid-cols-2 gap-4">
                                    <HomeBtn onClick={() => { unlockVoice(); setScreen('sel-asist'); }} icon={<i data-lucide="qr-code" size={32}></i>} label="Pasar Lista" color="text-indigo-600" />
                                    <HomeBtn onClick={() => setScreen('sel-tp')} icon={<i data-lucide="clipboard-list" size={32}></i>} label="Entrega TP" color="text-indigo-600" />
                                    <HomeBtn onClick={() => setScreen('sel-report')} icon={<i data-lucide="bar-chart-3" size={32}></i>} label="Reportes" color="text-slate-500" />
                                    <HomeBtn onClick={() => setScreen('sel-qr')} icon={<i data-lucide="printer" size={32}></i>} label="Generar QR" color="text-slate-500" />
                                    <HomeBtn onClick={() => setScreen('manage')} icon={<i data-lucide="settings" size={32}></i>} label="Gestionar" color="text-slate-400" />
                                </div>

                                {/* RESUMEN DE HOY */}
                                <div className="px-6 mt-10 text-left">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 px-2 italic">Resumen de Hoy (Global)</p>
                                    <div className="bg-white p-8 rounded-[40px] shadow-xl border border-slate-100 text-center">
                                        <div className="flex justify-around items-center">
                                            <div className="text-center">
                                                <p className="text-6xl font-black text-green-600 leading-none">{todaySummary.p}</p>
                                                <p className="text-[10px] font-black uppercase text-green-500 mt-2">Presentes</p>
                                            </div>
                                            <div className="w-px h-12 bg-slate-100"></div>
                                            <div className="text-center">
                                                <p className="text-6xl font-black text-red-600 leading-none">{todaySummary.a}</p>
                                                <p className="text-[10px] font-black uppercase text-red-400 mt-2">Ausentes</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="p-8 text-left">
                                    <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 px-2 italic">Tus Cursos</h2>
                                    <div className="space-y-3">
                                        {courses.map(c => (
                                            <div key={c.id} className="bg-slate-50 p-5 rounded-[32px] border border-slate-100 flex items-center justify-between shadow-sm">
                                                <div className="flex-1 text-left"><p className="font-black text-slate-700 uppercase text-xs truncate">{c.name}</p><p className="text-[8px] text-indigo-400 font-bold uppercase mt-1 italic tracking-widest">{c.school}</p></div>
                                                <div className="text-right"><p className="text-[8px] text-slate-400 font-bold uppercase italic">{c.students.length} alumnos</p></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {screen === 'manage' && (
                            <div className="p-6 space-y-6 animate-in text-left pb-20">
                                <div className="bg-white p-6 rounded-[40px] shadow-xl border border-slate-100 space-y-5">
                                    <p className="text-[10px] font-black text-indigo-600 uppercase italic px-2">Nuevo Curso</p>
                                    <input value={fCourse.name} onChange={e=>setFCourse({...fCourse, name:e.target.value})} placeholder="Nombre: Ej 4to 1ra" className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none text-sm" />
                                    <input value={fCourse.school} onChange={e=>setFCourse({...fCourse, school:e.target.value})} placeholder="Escuela" className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none text-sm" />
                                    <div className="space-y-3">
                                        <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-2 italic text-left">Días y Horario de Entrada</p>
                                        <div className="flex justify-between gap-1">
                                            {DAYS_ES.slice(1,7).map(d => (
                                                <button key={d.id} onClick={()=>{ const n = {...fCourse.schedule}; if(n[d.id]) delete n[d.id]; else n[d.id]="08:00"; setFCourse({...fCourse, schedule:n}); }} className={`flex-1 h-12 rounded-xl text-[10px] font-black border transition-all ${fCourse.schedule[d.id] ? 'bg-indigo-600 text-white border-indigo-600 shadow-lg' : 'bg-white text-slate-400 border-slate-100'}`}>{d.label.slice(0,1)}</button>
                                            ))}
                                        </div>
                                        {Object.entries(fCourse.schedule).map(([k,v]) => (
                                            <div key={k} className="flex items-center justify-between bg-slate-50 p-2 rounded-xl"><span className="text-[9px] font-black text-slate-400 uppercase">{DAYS_ES.find(x=>x.id==k).label}</span><input type="time" value={v} onChange={e=>setFCourse({...fCourse, schedule: {...fCourse.schedule, [k]:e.target.value}})} className="bg-white border rounded px-2 text-xs font-bold" /></div>
                                        ))}
                                    </div>
                                    <textarea value={fCourse.students} onChange={e=>setFCourse({...fCourse, students:e.target.value})} placeholder="Alumnos (uno por línea)..." className="w-full p-4 bg-slate-50 rounded-2xl h-40 outline-none text-xs font-medium"></textarea>
                                    <button onClick={async () => {
                                        if(!fCourse.name || !fCourse.school || !fCourse.students) return showToast("Faltan datos", "error");
                                        const list = fCourse.students.split('\n').map(s=>s.trim().toUpperCase()).filter(s=>s!=="");
                                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('courses').add({...fCourse, students: list, createdAt: firebase.firestore.FieldValue.serverTimestamp()});
                                        handleBack(); showToast("Curso Guardado");
                                    }} disabled={isSaving} className="w-full bg-indigo-700 text-white p-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl">{isSaving ? 'Guardando...' : 'Guardar Curso'}</button>
                                </div>

                                {/* SECCIÓN RESTAURADA: ZONA DE PELIGRO */}
                                <div className="bg-red-50 p-6 rounded-[40px] border border-red-100 shadow-sm space-y-4">
                                    <div className="flex items-center gap-2 text-red-600 px-2">
                                        <i data-lucide="alert-triangle" size={16}></i>
                                        <p className="text-[10px] font-black uppercase italic tracking-widest">Zona de Peligro</p>
                                    </div>
                                    <button onClick={clearAttendanceHistory} className="w-full bg-red-600 text-white p-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg active:scale-95 transition-all">Borrar Historial Completo</button>
                                </div>

                                <div className="space-y-3 pt-4">
                                    {courses.map(c => (
                                        <div key={c.id} className="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                                            <div className="flex-1 text-left"><p className="font-black text-slate-700 uppercase text-[10px]">{c.name}</p><p className="text-[8px] text-indigo-400 font-bold uppercase mt-1 italic">{c.school}</p></div>
                                            <button onClick={() => confirm("¿Borrar?") && db.collection('artifacts').doc(appId).collection('public').doc('data').collection('courses').doc(c.id).delete()} className="text-red-400 p-2"><i data-lucide="trash-2"></i></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {screen === 'sel-asist' && (
                            <div className="p-6 space-y-3 animate-in text-left">
                                {courses.map(c => (
                                    <button key={c.id} onClick={()=>{ unlockVoice(); setSelectedCourse(c); setScreen('asist-run');}} className="w-full bg-white p-6 rounded-[32px] border flex justify-between items-center shadow-sm text-left active:scale-95 transition-all">
                                        <div><span className="font-black uppercase text-xs text-slate-700 block">{c.name}</span><span className="text-[8px] font-black text-indigo-400 uppercase italic">{c.school}</span></div>
                                        <i data-lucide="chevron-right" className="text-indigo-600"></i>
                                    </button>
                                ))}
                            </div>
                        )}

                        {screen === 'asist-run' && selectedCourse && (
                            <div className="p-6 flex flex-col space-y-6 text-center animate-in">
                                <div className="bg-slate-900 aspect-square rounded-[48px] shadow-2xl relative overflow-hidden flex items-center justify-center">
                                    <div id="reader" className="w-full h-full"></div>
                                    {!cameraActive && (
                                        <div className="absolute inset-0 flex flex-col items-center justify-center p-10 bg-slate-900/80 z-10">
                                            <button onClick={startScanner} className="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl">Activar Cámara</button>
                                        </div>
                                    )}
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-green-50 p-6 rounded-3xl border text-center"><p className="text-4xl font-black text-green-600 leading-none">{sessionAttendance.length}</p><p className="text-[9px] font-black uppercase text-green-400 mt-2">Presentes</p></div>
                                    <div className="bg-red-50 p-6 rounded-3xl border text-center"><p className="text-4xl font-black text-red-600 leading-none">{selectedCourse.students.length - sessionAttendance.length}</p><p className="text-[9px] font-black uppercase text-red-400 mt-2">Faltan</p></div>
                                </div>
                                <button onClick={finalizeAsistencia} disabled={isSaving} className="w-full bg-indigo-700 text-white p-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl">Finalizar Jornada</button>
                            </div>
                        )}

                        {screen === 'sel-tp' && (
                            <div className="p-6 space-y-3 animate-in text-left">
                                {courses.map(c => (
                                    <button key={c.id} onClick={()=>{setSelectedCourse(c); setScreen('tp-list');}} className="w-full bg-white p-6 rounded-[32px] border flex justify-between items-center shadow-sm text-left active:scale-95 transition-all">
                                        <div><span className="font-black uppercase text-xs text-slate-700 block">{c.name}</span><span className="text-[8px] font-black text-indigo-400 uppercase italic">{c.school}</span></div>
                                        <i data-lucide="clipboard-list" className="text-indigo-600"></i>
                                    </button>
                                ))}
                            </div>
                        )}

                        {screen === 'tp-list' && selectedCourse && (
                            <div className="p-6 space-y-6 animate-in text-left">
                                <div className="bg-white p-6 rounded-[32px] border shadow-lg space-y-4">
                                    <p className="text-[10px] font-black text-indigo-600 uppercase italic ml-2">Nuevo TP</p>
                                    <input value={fTP.name} onChange={e=>setFTP({...fTP, name:e.target.value})} placeholder="Nombre del TP..." className="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-sm border" />
                                    <div className="grid grid-cols-2 gap-2">
                                        <div><p className="text-[8px] font-black uppercase text-slate-400 ml-2 mb-1">Inicio</p><input type="date" value={fTP.startDate} onChange={e=>setFTP({...fTP, startDate:e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl outline-none font-bold text-[10px] border" /></div>
                                        <div><p className="text-[8px] font-black uppercase text-slate-400 ml-2 mb-1">Límite</p><input type="date" value={fTP.endDate} onChange={e=>setFTP({...fTP, endDate:e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl outline-none font-bold text-[10px] border" /></div>
                                    </div>
                                    <button onClick={async () => {
                                        if(!fTP.name) return showToast("Falta nombre", "error");
                                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('assignments').add({...fTP, courseId:selectedCourse.id, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                                        setFTP({name:'', startDate: '', endDate: ''}); showToast("TP creado");
                                    }} className="w-full p-4 bg-indigo-600 text-white rounded-2xl shadow-lg flex items-center justify-center gap-2 font-black uppercase text-xs tracking-widest">Crear TP</button>
                                </div>
                                <div className="space-y-3">
                                    {assignments.filter(a => a.courseId === selectedCourse.id).map(a => (
                                        <div key={a.id} onClick={()=>{setSelectedTP(a); setScreen('tp-check');}} className="bg-white p-6 rounded-[36px] shadow-sm border flex items-center justify-between active:scale-95 transition-all cursor-pointer">
                                            <div className="text-left"><h3 className="font-black text-xs text-slate-800 uppercase leading-tight">{a.name}</h3><p className="text-[8px] text-slate-400 font-bold uppercase mt-1 italic">{a.startDate || 'S/D'} al {a.endDate || 'S/D'}</p></div>
                                            <i data-lucide="chevron-right" className="text-indigo-600"></i>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {screen === 'tp-check' && selectedTP && selectedCourse && (
                            <div className="p-6 space-y-4 animate-in pb-20 text-left">
                                <div className="bg-indigo-50 p-6 rounded-[40px] border border-indigo-100 flex justify-between items-center shadow-inner">
                                    <div><p className="text-[10px] font-black text-indigo-400 uppercase italic">{selectedCourse.name}</p><h2 className="text-xl font-black text-indigo-800 uppercase leading-tight">{selectedTP.name}</h2></div>
                                    <div className="text-right"><p className="text-3xl font-black text-indigo-700">{deliveries.filter(d => d.tpId === selectedTP.id && d.status === 'Entregado').length}</p><p className="text-[8px] font-black uppercase text-indigo-400 italic">OK</p></div>
                                </div>
                                <div className="space-y-2">
                                    {selectedCourse.students.map((s, idx) => {
                                        const d = deliveries.find(x => x.tpId === selectedTP.id && x.studentName === s);
                                        const status = d ? d.status : 'Pendiente';
                                        return (
                                            <div key={idx} className={`flex items-center justify-between p-4 rounded-3xl border transition-all cursor-pointer ${status === 'Entregado' ? 'bg-green-50 border-green-200' : status === 'Fuera de Término' ? 'bg-orange-50 border-orange-200' : 'bg-white border-slate-100 shadow-sm'}`}
                                                 onClick={async () => {
                                                    const path = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('deliveries');
                                                    const docId = `${selectedTP.id}_${s.replace(/\s+/g, '_')}`;
                                                    let nStatus = 'Pendiente';
                                                    if (status === 'Pendiente') nStatus = 'Entregado';
                                                    else if (status === 'Entregado') nStatus = 'Fuera de Término';
                                                    else nStatus = 'Pendiente';
                                                    if (nStatus === 'Pendiente') await path.doc(docId).delete();
                                                    else await path.doc(docId).set({ tpId: selectedTP.id, studentName: s, status: nStatus, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                                                 }}>
                                                <span className={`text-[10px] font-black uppercase truncate flex-1 pr-4 text-left ${status === 'Entregado' ? 'text-green-700' : status === 'Fuera de Término' ? 'text-orange-700' : 'text-slate-500'}`}>{s}</span>
                                                <div className={`px-4 py-2 rounded-2xl font-black text-[9px] uppercase tracking-widest transition-all ${status === 'Entregado' ? 'bg-green-600 text-white' : status === 'Fuera de Término' ? 'bg-orange-500 text-white' : 'bg-slate-50 text-slate-400'} text-right`}>{status}</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {screen === 'sel-report' && (
                            <div className="p-6 space-y-3 animate-in text-left">
                                {courses.map(c => (
                                    <button key={c.id} onClick={()=>{setSelectedCourse(c); setScreen('report-view');}} className="w-full bg-white p-6 rounded-[32px] border flex justify-between items-center shadow-sm text-left active:scale-95 transition-all">
                                        <div><span className="font-black uppercase text-xs text-slate-700 block">{c.name}</span><span className="text-[8px] font-black text-indigo-400 uppercase italic">{c.school}</span></div>
                                        <i data-lucide="bar-chart-3" className="text-indigo-600"></i>
                                    </button>
                                ))}
                            </div>
                        )}

                        {screen === 'report-view' && selectedCourse && (
                            <div className="p-6 space-y-4 animate-in pb-24 text-center">
                                <div className="flex bg-slate-200 p-1 rounded-[24px] shadow-inner mb-4 overflow-x-auto scrollbar-hide no-wrap">
                                    {['general', 'mensual', 'anual', 'tps'].map(t => (
                                        <button key={t} onClick={() => setReportTab(t)} className={`flex-1 py-3 px-4 text-[9px] font-black uppercase rounded-[20px] transition-all whitespace-nowrap ${reportTab === t ? 'bg-white text-indigo-600 shadow-xl' : 'text-slate-400'}`}>{t === 'general' ? 'Gral' : t === 'mensual' ? 'Mes' : t === 'anual' ? 'Año' : 'Tareas'}</button>
                                    ))}
                                </div>
                                {reportTab === 'tps' ? (
                                    <div className="space-y-4 text-left">
                                        {reportStats.map((s, i) => (
                                            <div key={i} className="bg-white p-6 rounded-[40px] shadow-sm border space-y-4 animate-in">
                                                <div className="flex justify-between items-start border-b border-slate-50 pb-3">
                                                    <div className="max-w-[70%]">
                                                        <p className="font-black text-slate-800 text-[11px] uppercase leading-tight italic">{s.name}</p>
                                                        <p className="text-[8px] font-black text-slate-400 uppercase mt-1 tracking-widest italic">Rendimiento en Trabajos</p>
                                                    </div>
                                                    <div className={`px-4 py-2 rounded-2xl font-black text-xs ${s.tpPerc > 70 ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'}`}>{s.tpPerc}%</div>
                                                </div>
                                                <div className="grid grid-cols-3 gap-2">
                                                    <div className="text-center bg-slate-50 p-3 rounded-2xl">
                                                        <p className="text-xl font-black text-indigo-600 leading-none">{s.totalAssignments}</p>
                                                        <p className="text-[6px] font-black text-indigo-400 uppercase mt-1">Totales</p>
                                                    </div>
                                                    <div className="text-center bg-green-50 p-3 rounded-2xl">
                                                        <p className="text-xl font-black text-green-600 leading-none">{s.deliveredOK}</p>
                                                        <p className="text-[6px] font-black text-green-400 uppercase mt-1">OK</p>
                                                    </div>
                                                    <div className="text-center bg-orange-50 p-3 rounded-2xl">
                                                        <p className="text-xl font-black text-orange-600 leading-none">{s.deliveredLate}</p>
                                                        <p className="text-[6px] font-black text-orange-400 uppercase mt-1">Tardíos</p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : reportTab === 'general' ? (
                                    <div className="bg-white rounded-[40px] border overflow-hidden shadow-xl animate-in text-center">
                                        <table className="w-full text-xs border-collapse">
                                            <thead className="bg-slate-50 text-[8px] font-black uppercase text-slate-400 border-b">
                                                <tr><th className="p-4 text-left">Alumno</th><th>P</th><th>T</th><th>A</th><th className="p-4 text-right">%</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">{reportStats.map((s, i) => (
                                                <tr key={i}><td className="p-4 text-left font-black text-slate-700 text-[10px] uppercase truncate max-w-[120px]">{s.name}</td><td className="text-green-600 font-bold">{s.p}</td><td className="text-amber-500 font-bold">{s.t}</td><td className="text-red-500 font-bold">{s.a}</td><td className={`p-4 text-right font-black ${s.attPerc > 80 ? 'text-green-600' : 'text-red-500'}`}>{s.attPerc}%</td></tr>
                                            ))}</tbody>
                                        </table>
                                    </div>
                                ) : (
                                    <div className="space-y-4 text-left">
                                        {reportStats.map((s, i) => (
                                            <div key={i} className="bg-white p-6 rounded-[40px] shadow-sm border space-y-4 animate-in">
                                                <div className="flex justify-between items-start">
                                                    <div className="max-w-[70%] text-left"><p className="font-black text-slate-800 text-[11px] uppercase italic">{s.name}</p></div>
                                                    <div className={`px-4 py-2 rounded-2xl font-black text-xs ${s.attPerc > 80 ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'}`}>{s.attPerc}%</div>
                                                </div>
                                                <div className="space-y-2">
                                                    {(reportTab === 'mensual' ? Object.entries(s.monthly) : Object.entries(s.yearly)).sort().reverse().map(([k, d]) => (
                                                        <div key={k} className="flex items-center justify-between bg-slate-50 p-4 rounded-2xl border">
                                                            <span className="text-[9px] font-black text-slate-400 uppercase italic">{reportTab === 'mensual' ? MONTHS_ES[k] : k}</span>
                                                            <div className="flex space-x-3 text-center">
                                                                <div><p className="text-[11px] font-black text-green-600 leading-none">{d.p}</p><p className="text-[6px] font-black text-green-400 uppercase">P</p></div>
                                                                <div><p className="text-[11px] font-black text-amber-600 leading-none">{d.t}</p><p className="text-[6px] font-black text-amber-500 uppercase">T</p></div>
                                                                <div><p className="text-[11px] font-black text-red-600 leading-none">{d.a}</p><p className="text-[6px] font-black text-red-400 uppercase">A</p></div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {screen === 'sel-qr' && (
                            <div className="p-6 space-y-3 animate-in text-left">
                                {courses.map(c => (
                                    <button key={c.id} onClick={()=>{setSelectedCourse(c); setScreen('qr-gen');}} className="w-full bg-white p-6 rounded-[32px] border flex justify-between items-center shadow-sm text-left active:scale-95 transition-all">
                                        <div><span className="font-black uppercase text-xs text-slate-700 block">{c.name}</span><span className="text-[8px] font-black text-indigo-400 uppercase italic">{c.school}</span></div>
                                        <i data-lucide="printer" className="text-indigo-600"></i>
                                    </button>
                                ))}
                            </div>
                        )}

                        {screen === 'qr-gen' && selectedCourse && (
                            <div className="p-6 space-y-6 animate-in text-center">
                                <button onClick={()=>window.print()} className="no-print w-full bg-indigo-600 text-white p-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg flex items-center justify-center gap-2"><i data-lucide="printer" size={16}></i> Imprimir Todo</button>
                                <div className="print-grid grid grid-cols-1 gap-4">
                                    {selectedCourse.students.map((student, i) => (
                                        <div key={i} className="bg-white p-6 rounded-[40px] border flex flex-col items-center text-center shadow-sm break-inside-avoid">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 italic leading-tight">{student}</p>
                                            <div className="bg-slate-50 p-4 rounded-3xl mb-4 text-center"><QRCodeLocal value={student} size={150} /></div>
                                            <p className="text-[8px] font-black text-indigo-400 uppercase tracking-widest italic">{selectedCourse.name} - {selectedCourse.school}</p>
                                        </div>
                                    ))}
                                </div>
                                <div className="h-20"></div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const HomeBtn = ({ icon, label, onClick, color = "text-slate-600" }) => {
            useEffect(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); }, []);
            return (
                <button onClick={onClick} className="flex flex-col items-center justify-center p-7 bg-white rounded-[40px] shadow-lg border border-slate-50 active:scale-90 transition-all group overflow-hidden relative">
                    <div className="absolute inset-0 bg-indigo-50/0 group-active:bg-indigo-50/100 transition-all"></div>
                    <div className={`${color} mb-3 group-hover:scale-110 transition-transform relative z-10 flex items-center justify-center`}>{icon}</div>
                    <span className="text-[10px] font-black text-slate-700 uppercase tracking-widest text-center leading-none mt-1 italic relative z-10">{label}</span>
                </button>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); }, 500);
    </script>
</body>
</html>
