<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Asistente Pro Final</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700;900&display=swap');
        :root { --primary: #4f46e5; --success: #22c55e; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Urbanist', sans-serif; background-color: var(--bg); margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .app-container { max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0,0,0,0.05); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #reader { border: none !important; border-radius: 48px; overflow: hidden; background: #0f172a; width: 100% !important; height: 100% !important; }
        #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }

        @media print {
            .no-print { display: none !important; }
            .app-container { max-width: 100% !important; box-shadow: none !important; }
            .print-grid { display: grid !important; grid-template-cols: repeat(3, 1fr) !important; gap: 10px !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCNPHo0Vu7yLAdY3r4YoosWxAoHsSghkuo",
            authDomain: "assistant-day-pro.firebaseapp.com",
            projectId: "assistant-day-pro",
            storageBucket: "assistant-day-pro.firebasestorage.app",
            messagingSenderId: "717751256878",
            appId: "1:717751256878:web:680a9bc9464b9330301cbf"
        };

        const appId = 'assistant-day-pro-v2';
        const GS_API_URL = "https://script.google.com/macros/s/AKfycbw1HLgHQSHIpkb8NQDG1mm39eKhL2LQbJ_JnMhUbXr-NCROkpzkmE_VV9YEc9AWRaVp/exec";

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const MONTHS_ES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        const QRCodeLocal = ({ value, size = 150 }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                if (window.QRious) { new QRious({ element: canvasRef.current, value: value, size: size, level: 'M' }); }
            }, [value, size]);
            return <canvas ref={canvasRef} className="rounded-2xl shadow-sm bg-white p-2" />;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [screen, setScreen] = useState('home');
            const [courses, setCourses] = useState([]);
            const [records, setRecords] = useState([]);
            const [assignments, setAssignments] = useState([]);
            const [deliveries, setDeliveries] = useState([]);
            const [selectedCourse, setSelectedCourse] = useState(null);
            const [selectedTP, setSelectedTP] = useState(null);
            const [sessionAttendance, setSessionAttendance] = useState([]);
            const [reportTab, setReportTab] = useState('general');
            const [toast, setToast] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            
            const qrScannerRef = useRef(null);
            const lastProcessedRef = useRef(null); 
            const processedNamesInSession = useRef(new Set());

            const [fCourse, setFCourse] = useState({ name: '', school: '', students: '', schedule: {} });
            const [editingCourseId, setEditingCourseId] = useState(null);
            const [fTP, setFTP] = useState({ name: '', startDate: '', dueDate: '' });

            useEffect(() => {
                auth.signInAnonymously().finally(() => setLoading(false));
                const unsubscribe = auth.onAuthStateChanged(u => setUser(u));
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const colBase = db.collection('artifacts').doc(appId).collection('public').doc('data');
                const unsubC = colBase.collection('courses').onSnapshot(snap => setCourses(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubA = colBase.collection('attendance').onSnapshot(snap => setRecords(snap.docs.map(d => d.data())));
                const unsubAs = colBase.collection('assignments').onSnapshot(snap => setAssignments(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubD = colBase.collection('deliveries').onSnapshot(snap => setDeliveries(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                return () => { unsubC(); unsubA(); unsubAs(); unsubD(); };
            }, [user]);

            useEffect(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); }, [screen, courses, assignments]);

            useEffect(() => {
                if (screen === 'asist-run' && selectedCourse) {
                    const startScanner = async () => {
                        try {
                            const html5QrCode = new Html5Qrcode("reader");
                            qrScannerRef.current = html5QrCode;
                            await html5QrCode.start(
                                { facingMode: "environment" },
                                { fps: 10, qrbox: { width: 250, height: 250 } },
                                (decodedText) => handleScan(decodedText)
                            );
                        } catch (err) {
                            console.error("Error cámara:", err);
                            showToast("No se pudo abrir la cámara", "error");
                        }
                    };
                    const timer = setTimeout(startScanner, 350);
                    return () => {
                        clearTimeout(timer);
                        if (qrScannerRef.current && qrScannerRef.current.isScanning) {
                            qrScannerRef.current.stop().catch(e => console.error(e));
                        }
                    };
                }
            }, [screen, selectedCourse]);

            const showToast = (msg, type = 'success') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            };

            const speak = (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'es-ES';
                    window.speechSynthesis.speak(utterance);
                }
            };

            const dailySummariesByCourse = useMemo(() => {
                const today = new Date().toISOString().split('T')[0];
                const recs = records.filter(r => r.date === today);
                return courses.map(c => {
                    const courseRecs = recs.filter(r => r.course === c.name && r.school === c.school);
                    if (courseRecs.length === 0) return null;
                    return { name: c.name, school: c.school, p: courseRecs.filter(r => r.status.includes('Presente')).length, a: courseRecs.filter(r => r.status === 'Ausente').length };
                }).filter(Boolean);
            }, [records, courses]);

            const reportStats = useMemo(() => {
                if (!selectedCourse) return [];
                const courseRecs = records.filter(r => r.course === selectedCourse.name);
                return selectedCourse.students.map(name => {
                    const studentRecs = courseRecs.filter(r => r.name === name);
                    const p = studentRecs.filter(r => r.status === 'Presente').length;
                    const t = studentRecs.filter(r => r.status === 'Presente con retraso').length;
                    const a = studentRecs.filter(r => r.status === 'Ausente').length;
                    const total = p + t + a;
                    const perc = total === 0 ? 0 : Math.round(((p + t) / total) * 100);
                    const monthly = {}; const yearly = {};
                    studentRecs.forEach(r => {
                        const d = new Date(r.date); const mKey = d.getMonth(); const yKey = d.getFullYear();
                        if(!monthly[mKey]) monthly[mKey] = { p: 0, t: 0, a: 0 };
                        if(!yearly[yKey]) yearly[yKey] = { p: 0, t: 0, a: 0 };
                        if(r.status === 'Presente') { monthly[mKey].p++; yearly[yKey].p++; }
                        else if(r.status === 'Presente con retraso') { monthly[mKey].t++; yearly[yKey].t++; }
                        else { monthly[mKey].a++; yearly[yKey].a++; }
                    });
                    return { name, p, t, a, perc, monthly, yearly };
                });
            }, [records, selectedCourse]);

            const handleBack = () => {
                setScreen('home'); setSelectedTP(null); setSelectedCourse(null); setSessionAttendance([]); setIsSaving(false); setEditingCourseId(null);
                setFCourse({ name: '', school: '', students: '', schedule: {} }); 
                setFTP({ name: '', startDate: '', dueDate: '' }); 
                processedNamesInSession.current.clear();
            };

            const handleDeleteCourse = async (id) => {
                if (!confirm("⚠️ ¿Borrar este curso definitivamente?")) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('courses').doc(id).delete();
                showToast("Curso borrado");
            };

            const clearHistory = async () => {
                if (!confirm("⚠️ ¿BORRAR TODO EL HISTORIAL DE ASISTENCIAS? Esta acción es irreversible.")) return;
                setIsSaving(true);
                try {
                    const snap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('attendance').get();
                    const batch = db.batch();
                    snap.docs.forEach(d => batch.delete(d.ref));
                    await batch.commit();
                    showToast("Historial borrado");
                } catch (e) { showToast("Error", "error"); } finally { setIsSaving(false); }
            };

            const saveCourse = async () => {
                if(!fCourse.name || !fCourse.students || !fCourse.school) return showToast("Faltan datos", "error");
                setIsSaving(true);
                const col = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('courses');
                const cleanStudentList = fCourse.students.split('\n').map(s => s.trim().toUpperCase()).filter(s => s !== "");
                const data = { name: fCourse.name.trim(), school: fCourse.school.trim(), students: cleanStudentList, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
                try {
                    if (editingCourseId) await col.doc(editingCourseId).update(data);
                    else await col.add({...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                    handleBack(); showToast("Curso guardado");
                } catch (e) { showToast("Error", "error"); } finally { setIsSaving(false); }
            };

            const handleScan = (decodedText) => {
                const nowTime = Date.now();
                if (lastProcessedRef.current && (nowTime - lastProcessedRef.current < 2500)) return;
                lastProcessedRef.current = nowTime;
                let cleanName = decodedText.trim().toUpperCase();
                
                if (!selectedCourse.students.some(s => s === cleanName)) {
                    const match = selectedCourse.students.find(s => cleanName.includes(s) || s.includes(cleanName));
                    if (match) cleanName = match; else return showToast(`No encontrado: ${cleanName}`, "error");
                }
                
                if (processedNamesInSession.current.has(cleanName)) { 
                    speak("Ya registrado"); 
                    return showToast(`Ya registrado`, "error"); 
                }
                
                processedNamesInSession.current.add(cleanName);
                const now = new Date();
                speak(cleanName);
                
                setSessionAttendance(prev => [...prev, { 
                    name: cleanName, course: selectedCourse.name, school: selectedCourse.school || "General", 
                    date: now.toISOString().split('T')[0], 
                    time: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), 
                    status: 'Presente', type: 'Asistencia' 
                }]);
                showToast(`${cleanName} OK`);
            };

            const finalizeAsistencia = async () => {
                if (sessionAttendance.length === 0) return showToast("Sin datos", "error");
                setIsSaving(true);
                const path = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('attendance');
                const today = new Date().toISOString().split('T')[0];
                try {
                    const batch = db.batch();
                    const ausentes = selectedCourse.students.filter(n => !sessionAttendance.find(s => s.name === n)).map(n => ({ 
                        name: n, course: selectedCourse.name, school: selectedCourse.school || "General", date: today, status: 'Ausente', time: '--:--', type: 'Asistencia' 
                    }));
                    
                    const allRecords = [...sessionAttendance, ...ausentes];
                    allRecords.forEach(rec => batch.set(path.doc(), rec));
                    await batch.commit();

                    if (GS_API_URL) {
                        fetch(GS_API_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            cache: 'no-cache',
                            body: JSON.stringify({ action: "attendance_bulk", payload: allRecords })
                        });
                    }

                    showToast("✓ Sincronización Exitosa"); handleBack();
                } catch (e) { showToast("Error", "error"); } finally { setIsSaving(false); }
            };

            if (loading) return <div className="flex h-screen items-center justify-center bg-indigo-700 text-white font-black italic animate-pulse tracking-widest uppercase text-xs">Cargando Sistema...</div>;

            return (
                <div className="app-container">
                    {toast && (
                        <div className={`fixed top-10 left-1/2 -translate-x-1/2 z-[100] px-6 py-4 rounded-3xl shadow-2xl animate-in font-black text-[10px] uppercase flex items-center gap-3 border ${toast.type === 'success' ? 'bg-green-500 text-white border-green-400' : 'bg-indigo-600 text-white border-indigo-500'}`}>
                            {toast.msg}
                        </div>
                    )}

                    {screen !== 'home' && (
                        <div className="bg-indigo-700 text-white p-6 pb-12 rounded-b-[40px] shadow-lg sticky top-0 z-50 flex items-center no-print text-center">
                            <button onClick={handleBack} className="p-2 bg-white/10 rounded-full"><i data-lucide="chevron-left"></i></button>
                            <h1 className="flex-1 text-center font-black uppercase text-[10px] tracking-widest italic truncate px-4">
                                {screen === 'manage' ? 'Gestión' : screen === 'asist-run' ? selectedCourse?.name : screen === 'report-view' ? 'Reportes' : screen === 'qr-gen' ? 'Credenciales' : 'Asistente'}
                            </h1>
                            <div className="w-10"></div>
                        </div>
                    )}

                    <div className="flex-1 overflow-y-auto scrollbar-hide">
                        {screen === 'home' && (
                            <div className="animate-in pb-10 text-center">
                                <div className="bg-indigo-700 text-white p-10 pb-20 rounded-b-[50px] text-center shadow-xl relative overflow-hidden">
                                    <div className="absolute top-0 right-0 -mr-10 -mt-10 w-48 h-48 bg-white/10 rounded-full blur-3xl"></div>
                                    <p className="text-indigo-200 text-[10px] font-black uppercase tracking-[0.4em] mb-2 text-center">Panel Docente</p>
                                    <h1 className="text-5xl font-black uppercase italic tracking-tighter leading-none text-center">Assistant Day</h1>
                                </div>
                                <div className="px-6 -mt-14 grid grid-cols-2 gap-4">
                                    <MenuBtn icon="qr-code" label="Pasar Lista" color="text-indigo-600" onClick={() => setScreen('sel-asist')} />
                                    <MenuBtn icon="clipboard-list" label="Entrega TP" color="text-indigo-600" onClick={() => setScreen('sel-tp')} />
                                    <MenuBtn icon="bar-chart-3" label="Reportes" color="text-slate-500" onClick={() => setScreen('sel-report')} />
                                    <MenuBtn icon="printer" label="Generar QR" color="text-slate-500" onClick={() => setScreen('sel-qr')} />
                                    <MenuBtn icon="settings" label="Gestionar" color="text-slate-400" onClick={() => setScreen('manage')} />
                                </div>
                                
                                <div className="px-6 mt-8 space-y-4">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2 italic text-left">Resumen de Hoy</p>
                                    {dailySummariesByCourse.length === 0 ? (
                                        <div className="bg-white p-8 rounded-[32px] border border-dashed border-slate-200 text-center">
                                            <p className="text-[9px] font-bold text-slate-300 uppercase italic">Sin actividad registrada hoy</p>
                                        </div>
                                    ) : dailySummariesByCourse.map((c, idx) => (
                                        <div key={idx} className="bg-white p-6 rounded-[40px] shadow-xl border border-slate-100 animate-in text-left">
                                            <div className="flex justify-between items-start mb-4 border-b border-slate-50 pb-3">
                                                <div><p className="text-[11px] font-black text-slate-800 uppercase italic leading-tight">{c.name}</p><p className="text-[8px] font-black text-indigo-400 uppercase tracking-widest">{c.school}</p></div>
                                            </div>
                                            <div className="flex justify-around items-center">
                                                <div className="text-center"><p className="text-4xl font-black text-green-600 leading-none">{c.p}</p><p className="text-[8px] font-black uppercase text-green-500 mt-1">Presentes</p></div>
                                                <div className="w-px h-10 bg-slate-100"></div>
                                                <div className="text-center"><p className="text-4xl font-black text-red-600 leading-none">{c.a}</p><p className="text-[8px] font-black uppercase text-red-400 mt-1">Ausentes</p></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {screen === 'manage' && (
                            <div className="p-6 space-y-6 animate-in text-left pb-20">
                                <div className="bg-white p-6 rounded-[40px] shadow-xl border border-slate-100 space-y-5" id="form-manage">
                                    <p className="text-[10px] font-black text-indigo-600 uppercase italic ml-2">{editingCourseId ? 'Editando Curso' : 'Nuevo Curso'}</p>
                                    <input value={fCourse.name} onChange={e=>setFCourse({...fCourse, name:e.target.value})} placeholder="Nombre: Ej 4to 1ra" className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none text-sm shadow-inner" />
                                    <input value={fCourse.school} onChange={e=>setFCourse({...fCourse, school:e.target.value})} placeholder="Escuela (Ej: Tilcara)" className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none text-sm shadow-inner" />
                                    <textarea value={fCourse.students} onChange={e=>setFCourse({...fCourse, students:e.target.value})} placeholder="Alumnos (uno por línea)..." className="w-full p-4 bg-slate-50 rounded-2xl h-40 outline-none text-[10px] font-black tracking-widest shadow-inner uppercase leading-relaxed"></textarea>
                                    <button onClick={saveCourse} disabled={isSaving} className="w-full bg-indigo-700 text-white p-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">{editingCourseId ? 'Actualizar Curso' : 'Guardar Curso'}</button>
                                </div>
                                
                                <div className="bg-red-50 p-6 rounded-[40px] border border-red-100 space-y-3 shadow-inner">
                                    <p className="text-[10px] font-black text-red-600 uppercase italic ml-2">Zona de Peligro</p>
                                    <button onClick={clearHistory} disabled={isSaving} className="w-full bg-red-600 text-white p-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-md active:scale-95 transition-all">Borrar Historial de Asistencia</button>
                                </div>

                                <div className="space-y-3 pt-4">
                                    {courses.map(c => (
                                        <div key={c.id} className="bg-white p-4 rounded-3xl border flex justify-between items-center shadow-sm">
                                            <div className="flex-1 text-left"><p className="font-black text-slate-700 uppercase text-[10px] leading-tight">{c.name}</p><p className="text-[8px] text-indigo-400 font-bold uppercase mt-1 italic">{c.school}</p></div>
                                            <div className="flex gap-2">
                                                <button onClick={() => { setFCourse({name:c.name, school:c.school || '', students:c.students.join('\n')}); setEditingCourseId(c.id); document.getElementById('form-manage').scrollIntoView({behavior:'smooth'}); }} className="text-indigo-600 bg-indigo-50 p-3 rounded-2xl active:scale-90 transition-all"><i data-lucide="pencil" size={18}></i></button>
                                                <button onClick={() => handleDeleteCourse(c.id)} className="text-red-600 bg-red-50 p-3 rounded-2xl active:scale-90 transition-all"><i data-lucide="trash-2" size={18}></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {screen === 'sel-report' && (
                            <div className="p-6 space-y-3 animate-in text-left">
                                {courses.map(c => (
                                    <button key={c.id} onClick={()=>{setSelectedCourse(c); setScreen('report-view');}} className="w-full bg-white p-6 rounded-[32px] border flex justify-between items-center shadow-sm text-left active:scale-95 transition-all">
                                        <div><span className="font-black uppercase text-xs text-slate-700 block">{c.name}</span><span className="text-[8px] font-black text-indigo-400 uppercase italic">{c.school}</span></div>
                                        <i data-lucide="bar-chart-3" className="text-indigo-600"></i>
                                    </button>
                                ))}
                            </div>
                        )}

                        {screen === 'report-view' && selectedCourse && (
                            <div className="p-6 space-y-4 animate-in pb-24 text-center">
                                <div className="flex bg-slate-200 p-1.5 rounded-3xl shadow-inner mb-4">
                                    {['general', 'mensual', 'anual', 'tareas'].map(t => (
                                        <button key={t} onClick={() => setReportTab(t)} className={`flex-1 py-3 text-[10px] font-black uppercase rounded-[22px] transition-all ${reportTab === t ? 'bg-white text-indigo-600 shadow-xl' : 'text-slate-400'}`}>
                                            {t === 'tareas' ? 'Tareas/TP' : t}
                                        </button>
                                    ))}
                                </div>
                                {reportTab === 'general' ? (
                                    <div className="bg-white rounded-[40px] border overflow-hidden shadow-xl animate-in text-center">
                                        <table className="w-full text-xs text-center border-collapse">
                                            <thead className="bg-slate-50 text-[8px] font-black uppercase text-slate-400 border-b">
                                                <tr><th className="p-4 text-left">Alumno</th><th>P</th><th>T</th><th>A</th><th className="p-4 text-right">%</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {reportStats.map((s, i) => (
                                                    <tr key={i}><td className="p-4 text-left font-black text-slate-700 text-[10px] uppercase italic truncate max-w-[120px]">{s.name}</td><td className="text-green-600 font-bold">{s.p}</td><td className="text-amber-500 font-bold">{s.t}</td><td className="text-red-500 font-bold">{s.a}</td><td className={`p-4 text-right font-black ${s.perc > 80 ? 'text-green-600' : 'text-red-500'}`}>{s.perc}%</td></tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                ) : reportTab === 'tareas' ? (
                                    <div className="bg-white rounded-[40px] border overflow-hidden shadow-xl animate-in p-4 text-left">
                                        <h3 className="text-[10px] font-black uppercase text-indigo-600 mb-4 italic ml-2">Estadísticas de TPs</h3>
                                        <div className="space-y-4">
                                            {selectedCourse.students.map((student, i) => {
                                                const studentAssignments = assignments.filter(a => a.courseId === selectedCourse.id);
                                                const studentDeliveries = deliveries.filter(d => d.studentName === student && studentAssignments.some(a => a.id === d.tpId));
                                                const total = studentAssignments.length;
                                                const entregados = studentDeliveries.filter(d => d.status === 'Entregado').length;
                                                const fueraTermino = studentDeliveries.filter(d => d.status === 'Fuera de Término').length;
                                                const pendientes = total - (entregados + fueraTermino);

                                                return (
                                                    <div key={i} className="bg-slate-50 p-5 rounded-[32px] border border-slate-100">
                                                        <div className="flex justify-between items-start mb-3">
                                                            <p className="font-black text-slate-700 text-[10px] uppercase leading-tight flex-1 truncate pr-2">{student}</p>
                                                            <div className="bg-indigo-600 text-white text-[8px] px-3 py-1 rounded-full font-black uppercase">Total: {total}</div>
                                                        </div>
                                                        <div className="grid grid-cols-3 gap-2">
                                                            <div className="bg-white p-2 rounded-2xl text-center border border-green-100 shadow-sm"><p className="text-green-600 font-black text-lg leading-none">{entregados}</p><p className="text-[6px] font-black uppercase text-green-400 mt-1">Entregados</p></div>
                                                            <div className="bg-white p-2 rounded-2xl text-center border border-orange-100 shadow-sm"><p className="text-orange-600 font-black text-lg leading-none">{fueraTermino}</p><p className="text-[6px] font-black uppercase text-orange-400 mt-1">F. Término</p></div>
                                                            <div className="bg-white p-2 rounded-2xl text-center border border-red-100 shadow-sm"><p className="text-red-600 font-black text-lg leading-none">{pendientes}</p><p className="text-[6px] font-black uppercase text-red-400 mt-1">Pendientes</p></div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-4 text-left">
                                        {reportStats.map((s, i) => (
                                            <div key={i} className="bg-white p-6 rounded-[40px] shadow-sm border border-slate-100 space-y-2 animate-in">
                                                <div className="flex justify-between items-start">
                                                    <p className="font-black text-slate-800 text-[11px] uppercase leading-tight italic text-left">{s.name}</p>
                                                    <div className={`px-4 py-2 rounded-2xl font-black text-xs ${s.perc > 80 ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'}`}>{s.perc}%</div>
                                                </div>
                                                <div className="space-y-2">
                                                    {(reportTab === 'mensual' ? Object.entries(s.monthly) : Object.entries(s.yearly)).sort().reverse().map(([k, d]) => (
                                                        <div key={k} className="flex items-center justify-between bg-slate-50 p-4 rounded-2xl border text-xs">
                                                            <span className="font-black text-slate-400 uppercase italic">{reportTab === 'mensual' ? MONTHS_ES[k] : k}</span>
                                                            <div className="flex space-x-3 text-center">
                                                                <div><p className="text-[11px] font-black text-green-600 leading-none">{d.p}</p><p className="text-[6px] font-black text-green-400 uppercase">P</p></div>
                                                                <div><p className="text-[11px] font-black text-amber-600 leading-none">{d.t}</p><p className="text-[6px] font-black text-amber-500 uppercase">T</p></div>
                                                                <div><p className="text-[11px] font-black text-red-600 leading-none">{d.a}</p><p className="text-[6px] font-black text-red-400 uppercase">A</p></div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {screen === 'sel-tp' && (
                            <div className="p-6 space-y-3 animate-in text-left">
                                {courses.map(c => (
                                    <button key={c.id} onClick={()=>{setSelectedCourse(c); setScreen('tp-list');}} className="w-full bg-white p-6 rounded-[32px] border flex justify-between items-center shadow-sm text-left active:scale-95 transition-all">
                                        <div><span className="font-black uppercase text-xs text-slate-700 block">{c.name}</span><span className="text-[8px] font-black text-indigo-400 uppercase italic">{c.school}</span></div>
                                        <i data-lucide="clipboard-list" className="text-indigo-600"></i>
                                    </button>
                                ))}
                            </div>
                        )}

                        {screen === 'tp-list' && selectedCourse && (
                            <div className="p-6 space-y-6 animate-in text-left">
                                <div className="bg-white p-6 rounded-[32px] border shadow-lg space-y-4">
                                    <p className="text-[10px] font-black text-indigo-600 uppercase italic ml-2">Nuevo Trabajo Práctico</p>
                                    <div className="space-y-3">
                                        <input value={fTP.name} onChange={e=>setFTP({...fTP, name:e.target.value})} placeholder="Nombre del TP..." className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none text-sm shadow-inner" />
                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <p className="text-[8px] font-black text-slate-400 uppercase italic mb-1 ml-2">Fecha Inicio</p>
                                                <input type="date" value={fTP.startDate} onChange={e=>setFTP({...fTP, startDate:e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none text-sm shadow-inner" />
                                            </div>
                                            <div>
                                                <p className="text-[8px] font-black text-slate-400 uppercase italic mb-1 ml-2">Fecha Entrega</p>
                                                <input type="date" value={fTP.dueDate} onChange={e=>setFTP({...fTP, dueDate:e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none text-sm shadow-inner" />
                                            </div>
                                        </div>
                                        <button onClick={async () => {
                                            if(!fTP.name) return;
                                            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('assignments').add({ name: fTP.name, startDate: fTP.startDate, dueDate: fTP.dueDate, courseId: selectedCourse.id, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                                            setFTP({name:'', startDate: '', dueDate: ''}); showToast("TP Creado");
                                        }} className="w-full bg-indigo-600 text-white p-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-md active:scale-95 transition-all">Crear Trabajo Práctico</button>
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    {assignments.filter(a => a.courseId === selectedCourse.id).map(a => (
                                        <div key={a.id} onClick={()=>{setSelectedTP(a); setScreen('tp-check');}} className="bg-white p-6 rounded-[36px] shadow-sm border border-slate-100 flex items-center justify-between active:scale-95 transition-all cursor-pointer">
                                            <div className="text-left">
                                                <p className="font-black text-slate-800 text-xs uppercase leading-tight">{a.name}</p>
                                                <div className="flex gap-2 mt-1">
                                                    <p className="text-[7px] text-slate-400 font-black uppercase italic">Inicio: {a.startDate || '--'}</p>
                                                    <p className="text-[7px] text-red-400 font-black uppercase italic">Vence: {a.dueDate || '--'}</p>
                                                </div>
                                            </div>
                                            <button onClick={(e) => { e.stopPropagation(); if(confirm("¿Eliminar?")) db.collection('artifacts').doc(appId).collection('public').doc('data').collection('assignments').doc(a.id).delete(); }} className="text-slate-200"><i data-lucide="trash-2"></i></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {screen === 'tp-check' && selectedTP && selectedCourse && (
                            <div className="p-6 space-y-4 animate-in pb-20 text-left">
                                <div className="bg-indigo-50 p-6 rounded-[40px] border border-indigo-100 flex justify-between items-center shadow-inner">
                                    <div className="text-left">
                                        <p className="text-[9px] font-black text-indigo-400 uppercase italic leading-tight">{selectedCourse.name}</p>
                                        <h2 className="text-lg font-black text-indigo-800 uppercase leading-tight">{selectedTP.name}</h2>
                                        <div className="flex gap-3 mt-1">
                                            <p className="text-[7px] font-black text-slate-400 uppercase tracking-widest italic">Inicio: {selectedTP.startDate || '--'}</p>
                                            <p className="text-[7px] font-black text-red-500 uppercase tracking-widest italic">Límite: {selectedTP.dueDate || '--'}</p>
                                        </div>
                                    </div>
                                    <div className="text-right font-black text-indigo-700 text-2xl">{deliveries.filter(d => d.tpId === selectedTP.id && d.status === 'Entregado').length}</div>
                                </div>
                                <div className="space-y-2">
                                    {selectedCourse.students.map((s, idx) => {
                                        const d = deliveries.find(x => x.tpId === selectedTP.id && x.studentName === s);
                                        const status = d ? d.status : 'Pendiente';
                                        return (
                                            <div key={idx} className={`flex items-center justify-between p-4 rounded-3xl border transition-all cursor-pointer ${status === 'Entregado' ? 'bg-green-50 border-green-200' : status === 'Fuera de Término' ? 'bg-orange-50 border-orange-200' : 'bg-white border-slate-100 shadow-sm'}`}
                                                 onClick={async () => {
                                                    const path = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('deliveries');
                                                    const docId = `${selectedTP.id}_${s.replace(/\s+/g, '_')}`;
                                                    let nStatus = (status === 'Pendiente') ? 'Entregado' : (status === 'Entregado') ? 'Fuera de Término' : 'Pendiente';
                                                    if (nStatus === 'Pendiente') await path.doc(docId).delete();
                                                    else await path.doc(docId).set({ tpId: selectedTP.id, studentName: s, status: nStatus, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                                                 }}>
                                                <span className={`text-[10px] font-black uppercase flex-1 pr-4 text-left truncate ${status === 'Entregado' ? 'text-green-700' : status === 'Fuera de Término' ? 'text-orange-700' : 'text-slate-500'}`}>{s}</span>
                                                <div className={`px-4 py-2 rounded-2xl font-black text-[9px] uppercase tracking-widest ${status === 'Entregado' ? 'bg-green-600 text-white shadow-md' : status === 'Fuera de Término' ? 'bg-orange-500 text-white shadow-md' : 'bg-slate-50 text-slate-400'}`}>{status}</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {screen === 'sel-qr' && (
                            <div className="p-6 space-y-3 animate-in text-left">
                                {courses.map(c => (
                                    <button key={c.id} onClick={()=>{setSelectedCourse(c); setScreen('qr-gen');}} className="w-full bg-white p-6 rounded-[32px] border flex justify-between items-center shadow-sm text-left active:scale-95 transition-all">
                                        <div><span className="font-black uppercase text-xs text-slate-700 block">{c.name}</span><span className="text-[8px] font-black text-indigo-400 uppercase italic">{c.school}</span></div>
                                        <i data-lucide="printer" className="text-indigo-600"></i>
                                    </button>
                                ))}
                            </div>
                        )}

                        {screen === 'qr-gen' && selectedCourse && (
                            <div className="p-6 space-y-6 animate-in text-center">
                                <button onClick={()=>window.print()} className="no-print w-full bg-indigo-600 text-white p-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg active:scale-95 transition-all">Imprimir Credenciales</button>
                                <div className="print-grid grid grid-cols-1 gap-4">
                                    {selectedCourse.students.map((student, i) => (
                                        <div key={i} className="bg-white p-6 rounded-[40px] border flex flex-col items-center shadow-sm break-inside-avoid">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 italic text-center leading-tight truncate px-2">{student}</p>
                                            <QRCodeLocal value={student} size={150} />
                                            <p className="text-[8px] font-black text-indigo-400 uppercase italic mt-4 text-center">{selectedCourse.name} - {selectedCourse.school}</p>
                                        </div>
                                    ))}
                                </div>
                                <div className="h-20"></div>
                            </div>
                        )}

                        {screen === 'sel-asist' && (
                            <div className="p-6 space-y-3 animate-in text-left">
                                {courses.map(c => (
                                    <button key={c.id} onClick={()=>{setSelectedCourse(c); setScreen('asist-run');}} className="w-full bg-white p-6 rounded-[32px] border flex justify-between items-center shadow-sm text-left active:scale-95 transition-all">
                                        <div><span className="font-black uppercase text-xs text-slate-700 block">{c.name}</span><span className="text-[8px] font-black text-indigo-400 uppercase italic">{c.school}</span></div>
                                        <i data-lucide="chevron-right" className="text-indigo-600"></i>
                                    </button>
                                ))}
                            </div>
                        )}

                        {screen === 'asist-run' && selectedCourse && (
                            <div className="p-6 flex flex-col space-y-6 text-center animate-in">
                                <div className="bg-slate-900 aspect-square rounded-[48px] shadow-2xl relative overflow-hidden flex items-center justify-center cursor-pointer">
                                    <div id="reader" className="w-full h-full"></div>
                                    <div className="absolute inset-0 flex flex-col items-center justify-center text-white/20 pointer-events-none">
                                        <i data-lucide="camera" size={60} className="animate-pulse mb-2"></i>
                                        <p className="text-[8px] font-black uppercase tracking-widest">Escaneando...</p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-green-50 p-6 rounded-3xl border text-center shadow-sm"><p className="text-4xl font-black text-green-600 leading-none">{sessionAttendance.length}</p><p className="text-[9px] font-black uppercase text-green-400 mt-2">Presentes</p></div>
                                    <div className="bg-red-50 p-6 rounded-3xl border text-center shadow-sm"><p className="text-4xl font-black text-red-600 leading-none">{selectedCourse.students.length - sessionAttendance.length}</p><p className="text-[9px] font-black uppercase text-red-400 mt-2">Faltan</p></div>
                                </div>
                                <button onClick={finalizeAsistencia} disabled={isSaving} className="w-full bg-indigo-700 text-white p-6 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all">Guardar Jornada</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const MenuBtn = ({ icon, label, onClick, color = "text-slate-600" }) => {
            useEffect(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); }, []);
            return (
                <button onClick={onClick} className="flex flex-col items-center justify-center p-7 bg-white rounded-[40px] shadow-lg border border-slate-50 active:scale-90 transition-all cursor-pointer relative overflow-hidden group">
                    <div className="absolute inset-0 bg-indigo-50/0 group-active:bg-indigo-50/100 transition-all"></div>
                    <div className={`${color} mb-3 group-hover:scale-110 transition-transform relative z-10 flex items-center justify-center`}><i data-lucide={icon} size={30}></i></div>
                    <span className="text-[10px] font-black text-slate-700 uppercase tracking-widest text-center leading-none mt-1 italic relative z-10">{label}</span>
                </button>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); }, 500);
    </script>
</body>
</html>
