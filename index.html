<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Assistant Day - Control Docente Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .app-container { max-width: 450px; margin: 0 auto; background: white; min-height: 100vh; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(30%) sepia(100%) saturate(500%) hue-rotate(200deg); }
        .no-wrap { flex-wrap: nowrap !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURACIÓN FIREBASE (Se conecta a tu cuenta) ---
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const appId = window.__app_id || 'assistant-day-pro-v2';
        const GS_API_URL = "https://script.google.com/macros/s/AKfycbzoPRSNulMx4LJ3vfX70mP5oUFAgjetbN4J7wJNOw1oYtfRDMZjSaRAArPVsK9c8Y3_/exec";

        const firebaseApp = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const DAYS_MAP = [
            { id: 0, label: 'Dom' }, { id: 1, label: 'Lun' }, { id: 2, label: 'Mar' },
            { id: 3, label: 'Mie' }, { id: 4, label: 'Jue' }, { id: 5, label: 'Vie' },
            { id: 6, label: 'Sab' }
        ];

        const MONTHS_ES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentScreen, setCurrentScreen] = useState('home');
            const [courses, setCourses] = useState([]);
            const [records, setRecords] = useState([]);
            const [assignments, setAssignments] = useState([]);
            const [deliveries, setDeliveries] = useState([]);
            const [selectedCourse, setSelectedCourse] = useState(null);
            const [selectedTP, setSelectedTP] = useState(null);
            const [statsTab, setStatsTab] = useState('general');
            const [notifications, setNotifications] = useState([]);
            const [isSyncing, setIsSyncing] = useState(false);

            // Formularios
            const [newCourseName, setNewCourseName] = useState('');
            const [newCourseStudents, setNewCourseStudents] = useState('');
            const [dynamicSchedule, setDynamicSchedule] = useState({});
            const [newTPName, setNewTPName] = useState('');
            const [sessionAttendance, setSessionAttendance] = useState([]);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        const token = window.__initial_auth_token;
                        if (token) { await auth.signInWithCustomToken(token); } 
                        else { await auth.signInAnonymously(); }
                    } catch (e) { console.error("Auth:", e); }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                setLoading(true);
                const colBase = db.collection('artifacts').doc(appId).collection('public').doc('data');

                const unsubCourses = colBase.collection('courses').onSnapshot(snap => {
                    setCourses(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoading(false);
                }, err => console.error(err));

                const unsubRecords = colBase.collection('attendance').onSnapshot(snap => {
                    setRecords(snap.docs.map(d => d.data()));
                }, err => console.error(err));

                const unsubAssignments = colBase.collection('assignments').onSnapshot(snap => {
                    setAssignments(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const unsubDeliveries = colBase.collection('deliveries').onSnapshot(snap => {
                    setDeliveries(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                return () => { unsubCourses(); unsubRecords(); unsubAssignments(); unsubDeliveries(); };
            }, [user]);

            const addNotification = (msg, type = 'info') => {
                const id = Date.now();
                setNotifications(prev => [...prev, { id, msg, type }]);
                setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== id)), 3000);
            };

            const goToHome = () => {
                setSelectedTP(null);
                setSelectedCourse(null);
                setCurrentScreen('home');
                setSessionAttendance([]);
                setStatsTab('general');
            };

            // --- LÓGICA DE ASISTENCIA ---
            const handleScan = (name) => {
                if (sessionAttendance.find(s => s.name === name)) return addNotification("Ya registrado", "info");
                const now = new Date();
                const todayDay = now.getDay();
                const todaySched = selectedCourse.schedule?.find(s => s.day === todayDay);
                let status = 'Presente';
                
                if (todaySched) {
                    const [schedH, schedM] = todaySched.time.split(':').map(Number);
                    const limit = new Date();
                    limit.setHours(schedH, schedM + 10, 0); 
                    if (now > limit) status = 'Presente con retraso';
                }

                setSessionAttendance(prev => [...prev, {
                    name, course: selectedCourse.name, date: now.toISOString().split('T')[0],
                    time: now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' }),
                    status, type: 'Asistencia'
                }]);
                addNotification(`${name.split(' ').pop()}: OK`, "success");
            };

            const finalizeAttendance = async () => {
                setIsSyncing(true);
                const today = new Date().toISOString().split('T')[0];
                const absentees = selectedCourse.students
                    .filter(n => !sessionAttendance.find(s => s.name === n))
                    .map(n => ({ name: n, course: selectedCourse.name, date: today, time: '--:--', status: 'Ausente', type: 'Asistencia' }));
                
                const all = [...sessionAttendance, ...absentees];
                try {
                    const col = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('attendance');
                    for (const rec of all) {
                        await col.add(rec);
                        if (GS_API_URL) fetch(GS_API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(rec) });
                    }
                    goToHome();
                    addNotification("Asistencia guardada", "success");
                } catch (e) { addNotification("Error al sincronizar", "error"); }
                setIsSyncing(false);
            };

            const todaySummary = useMemo(() => {
                const today = new Date().toISOString().split('T')[0];
                const todayRecords = records.filter(r => r.date === today);
                const totalP = todayRecords.filter(r => r.status === 'Presente').length;
                const totalT = todayRecords.filter(r => r.status === 'Presente con retraso').length;
                const totalA = todayRecords.filter(r => r.status === 'Ausente').length;
                const courseStats = courses.map(c => {
                    const recs = todayRecords.filter(r => r.course === c.name);
                    return { name: c.name, p: recs.filter(r => r.status === 'Presente').length, t: recs.filter(r => r.status === 'Presente con retraso').length, a: recs.filter(r => r.status === 'Ausente').length };
                }).filter(c => c.p + c.t + c.a > 0);
                return { totalP, totalT, totalA, courseStats };
            }, [records, courses]);

            const statsData = useMemo(() => {
                if (!selectedCourse) return null;
                const courseRecs = records.filter(r => r.course === selectedCourse.name);
                const studentList = selectedCourse.students.map(name => {
                    const personal = courseRecs.filter(r => r.name === name);
                    const p = personal.filter(r => r.status === 'Presente').length;
                    const t = personal.filter(r => r.status === 'Presente con retraso').length;
                    const a = personal.filter(r => r.status === 'Ausente').length;
                    const total = p + t + a;
                    const monthly = {}; const yearly = {};
                    personal.forEach(r => {
                        const d = new Date(r.date);
                        const mKey = `${d.getFullYear()}-${d.getMonth()}`;
                        const yKey = `${d.getFullYear()}`;
                        if (!monthly[mKey]) monthly[mKey] = { p: 0, t: 0, a: 0 };
                        if (!yearly[yKey]) yearly[yKey] = { p: 0, t: 0, a: 0 };
                        if (r.status === 'Presente') { monthly[mKey].p++; yearly[yKey].p++; }
                        else if (r.status === 'Presente con retraso') { monthly[mKey].t++; yearly[yKey].t++; }
                        else if (r.status === 'Ausente') { monthly[mKey].a++; yearly[yKey].a++; }
                    });
                    return { name, p, t, a, percentage: total === 0 ? 0 : Math.round(((p+t)/total)*100), monthly, yearly };
                });
                return { studentList, totalSessions: [...new Set(courseRecs.map(r => r.date))].length };
            }, [records, selectedCourse]);

            if (loading) return <div className="flex h-screen items-center justify-center bg-indigo-700 text-white font-black uppercase text-xs tracking-widest italic">Conectando...</div>;

            return (
                <div className="app-container">
                    {/* NOTIFICACIONES */}
                    <div className="fixed top-4 left-1/2 -translate-x-1/2 z-[100] w-full max-w-[300px] space-y-2 pointer-events-none px-4">
                        {notifications.map(n => (
                            <div key={n.id} className={`p-4 rounded-2xl shadow-xl border-l-4 font-black text-[10px] uppercase flex items-center bg-white animate-bounce ${n.type === 'success' ? 'border-green-500 text-green-700' : 'border-red-500 text-red-700'}`}>
                                {n.msg}
                            </div>
                        ))}
                    </div>

                    {/* CABECERA */}
                    {currentScreen !== 'home' && (
                        <div className="bg-indigo-700 text-white p-6 flex items-center shadow-lg sticky top-0 z-50">
                            <button onClick={goToHome} className="p-2 bg-white/10 rounded-full mr-4"><i data-lucide="chevron-left"></i></button>
                            <h1 className="font-black uppercase text-[10px] tracking-widest truncate flex-1 text-center italic">
                                {currentScreen === 'report' ? `Reporte: ${selectedCourse?.name}` : currentScreen === 'tp-check' ? `TP: ${selectedTP?.name}` : currentScreen === 'asist' ? 'Pasar Lista' : currentScreen === 'daily-summary' ? 'Resumen de Hoy' : selectedCourse?.name || "Assistant Day"}
                            </h1>
                            <div className="w-10"></div>
                        </div>
                    )}

                    {/* INICIO */}
                    {currentScreen === 'home' && (
                        <div className="animate-fade-in pb-10">
                            <div className="bg-indigo-700 text-white p-10 text-center rounded-b-[40px] shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-10 -mt-10 blur-2xl"></div>
                                <p className="text-indigo-200 text-[10px] font-black uppercase tracking-[0.4em] mb-2">Panel Docente</p>
                                <h1 className="text-4xl font-black italic uppercase tracking-tighter">Assistant Day</h1>
                            </div>

                            <div className="px-6 -mt-10 grid grid-cols-2 gap-4">
                                <HomeCard onClick={() => setCurrentScreen('sel-asist')} icon="qr-code" label="Pasar Lista" color="text-indigo-600" />
                                <HomeCard onClick={() => setCurrentScreen('sel-tp')} icon="clipboard-list" label="Entrega TP" color="text-indigo-600" />
                                <HomeCard onClick={() => setCurrentScreen('manage')} icon="settings" label="Gestionar" />
                                <HomeCard onClick={() => setCurrentScreen('sel-report')} icon="bar-chart-3" label="Reportes" />
                            </div>

                            {/* BOTÓN RESUMEN DE HOY */}
                            <div className="px-6 mt-6">
                                <button onClick={() => setCurrentScreen('daily-summary')} className="w-full bg-white border border-slate-100 rounded-[40px] p-8 shadow-xl active:scale-95 transition-all text-center relative overflow-hidden">
                                    <div className="absolute top-0 left-0 p-4 opacity-5 text-indigo-700"><i data-lucide="activity" size={48}></i></div>
                                    <p className="font-black uppercase text-[10px] tracking-widest mb-4 italic text-slate-400">Resumen de Hoy</p>
                                    <div className="flex justify-around items-center">
                                        <div className="text-center">
                                            <p className="text-5xl font-black text-green-600">{todaySummary.totalP + todaySummary.totalT}</p>
                                            <p className="text-[8px] font-black uppercase mt-1 text-green-600">Presentes</p>
                                        </div>
                                        <div className="w-px h-12 bg-slate-100"></div>
                                        <div className="text-center">
                                            <p className="text-5xl font-black text-red-600">{todaySummary.totalA}</p>
                                            <p className="text-[8px] font-black uppercase mt-1 text-red-600">Ausentes</p>
                                        </div>
                                    </div>
                                </button>
                            </div>

                            <div className="p-6">
                                <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 px-2 italic">Mis Cursos</h2>
                                <div className="space-y-3">
                                    {courses.map(c => (
                                        <div key={c.id} onClick={() => { setSelectedCourse(c); setCurrentScreen('report'); }} className="bg-slate-50 p-4 rounded-3xl border border-slate-100 flex items-center justify-between active:scale-95 transition-all cursor-pointer">
                                            <div className="flex items-center space-x-4">
                                                <div className="w-10 h-10 bg-indigo-100 rounded-2xl flex items-center justify-center text-indigo-600"><i data-lucide="users"></i></div>
                                                <div><p className="font-black text-slate-800 text-sm uppercase leading-tight">{c.name}</p><p className="text-[8px] text-indigo-400 font-bold uppercase tracking-wider italic">{c.students.length} Alumnos</p></div>
                                            </div>
                                            <i data-lucide="chevron-right" className="text-slate-200"></i>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* RESTO DE PANTALLAS (Simplificadas para GitHub) */}
                    {currentScreen === 'daily-summary' && (
                        <div className="p-6 space-y-6 animate-fade-in">
                            <div className="bg-white p-6 rounded-[40px] border shadow-sm space-y-4">
                                <div className="grid grid-cols-3 gap-2">
                                    <div className="bg-green-50 p-4 rounded-2xl text-center"><p className="text-2xl font-black text-green-600">{todaySummary.totalP}</p><p className="text-[7px] font-black uppercase text-green-400">Pres</p></div>
                                    <div className="bg-amber-50 p-4 rounded-2xl text-center"><p className="text-2xl font-black text-amber-600">{todaySummary.totalT}</p><p className="text-[7px] font-black uppercase text-amber-400">Tard</p></div>
                                    <div className="bg-red-50 p-4 rounded-2xl text-center"><p className="text-2xl font-black text-red-600">{todaySummary.totalA}</p><p className="text-[7px] font-black uppercase text-red-400">Aus</p></div>
                                </div>
                            </div>
                            <div className="space-y-3">
                                {todaySummary.courseStats.map(c => (
                                    <div key={c.name} className="bg-white p-5 rounded-[32px] border shadow-sm flex justify-between items-center">
                                        <p className="font-black text-slate-800 text-[10px] uppercase">{c.name}</p>
                                        <span className="text-[9px] font-black text-indigo-600">P:{c.p} T:{c.t} A:{c.a}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {currentScreen === 'sel-report' && (
                        <div className="p-6 space-y-3">
                            {courses.map(c => (
                                <button key={c.id} onClick={() => { setSelectedCourse(c); setCurrentScreen('report'); }} className="w-full bg-white p-6 rounded-[32px] flex justify-between items-center shadow-sm border active:scale-95 transition-all">
                                    <span className="font-black text-slate-800 uppercase text-xs">{c.name}</span>
                                    <i data-lucide="bar-chart-3" className="text-indigo-600"></i>
                                </button>
                            ))}
                        </div>
                    )}

                    {currentScreen === 'report' && statsData && (
                        <div className="p-4 space-y-4 animate-fade-in pb-20">
                            <div className="flex bg-slate-100 p-1 rounded-2xl shadow-inner">
                                {['general', 'monthly', 'yearly'].map(t => (
                                    <button key={t} onClick={() => setStatsTab(t)} className={`flex-1 py-3 text-[10px] font-black uppercase rounded-xl transition-all ${statsTab === t ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}>{t === 'general' ? 'Global' : t === 'monthly' ? 'Mes' : 'Año'}</button>
                                ))}
                            </div>
                            <div className="bg-white p-6 rounded-[40px] border shadow-sm">
                                <p className="text-[10px] font-black text-slate-400 uppercase text-center mb-4">Detalle de Asistencia</p>
                                <div className="space-y-2">
                                    {statsData.studentList.map(s => (
                                        <div key={s.name} className="flex justify-between items-center bg-slate-50 p-3 rounded-2xl">
                                            <span className="text-[9px] font-black text-slate-700 uppercase truncate max-w-[150px]">{s.name}</span>
                                            <span className="text-[10px] font-black text-indigo-600">{s.percentage}%</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {currentScreen === 'manage' && (
                        <div className="p-6 space-y-6 pb-20">
                            <div className="bg-white p-6 rounded-[40px] shadow-xl border space-y-5">
                                <label className="text-[10px] font-black uppercase text-indigo-600 tracking-widest italic">Nuevo Curso</label>
                                <input type="text" value={newCourseName} onChange={e => setNewCourseName(e.target.value)} placeholder="Ej: 3ro 2da" className="w-full p-5 bg-slate-50 rounded-2xl font-bold border outline-none text-sm" />
                                <div className="space-y-3">
                                    <div className="flex overflow-x-auto gap-2 py-1 scrollbar-hide no-wrap">
                                        {DAYS_MAP.slice(1,6).map(day => (
                                            <button key={day.id} onClick={() => {
                                                const dKey = String(day.id);
                                                setDynamicSchedule(prev => {
                                                    const n = { ...prev };
                                                    if (n[dKey]) delete n[dKey]; else n[dKey] = "08:00";
                                                    return n;
                                                });
                                            }} className={`flex-shrink-0 w-12 h-12 rounded-xl text-[10px] font-black transition-all border flex items-center justify-center ${dynamicSchedule[String(day.id)] ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-slate-50 border-slate-200 text-slate-400'}`}>{day.label}</button>
                                        ))}
                                    </div>
                                </div>
                                <textarea value={newCourseStudents} onChange={e => setNewCourseStudents(e.target.value)} placeholder="Escribe los alumnos (uno por línea)..." className="w-full p-5 bg-slate-50 rounded-2xl h-32 text-xs font-medium outline-none border focus:border-indigo-600"></textarea>
                                <button onClick={async () => {
                                    if (!newCourseName || !newCourseStudents) return addNotification("Faltan datos", "error");
                                    const list = newCourseStudents.split('\n').map(l => l.trim().toUpperCase()).filter(s => s !== "");
                                    const sched = Object.keys(dynamicSchedule).map(k => ({ day: parseInt(k), time: dynamicSchedule[k] }));
                                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('courses').add({ name: newCourseName, students: list, schedule: sched, createdAt: new Date().toISOString() });
                                    goToHome(); addNotification("Curso guardado", "success");
                                }} className="w-full bg-indigo-600 text-white p-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg">Guardar Curso</button>
                            </div>
                            {courses.map(c => (
                                <div key={c.id} className="bg-white p-4 rounded-3xl border flex justify-between items-center shadow-sm">
                                    <p className="font-black text-slate-700 text-[10px] uppercase">{c.name}</p>
                                    <button onClick={() => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('courses').doc(c.id).delete()} className="text-red-400 p-2"><i data-lucide="trash-2"></i></button>
                                </div>
                            ))}
                        </div>
                    )}

                    {currentScreen === 'sel-asist' && (
                        <div className="p-6 space-y-3">
                            {courses.map(c => (
                                <button key={c.id} onClick={() => { setSelectedCourse(c); setCurrentScreen('asist'); }} className="w-full bg-white p-6 rounded-[32px] flex justify-between items-center shadow-sm border active:scale-95 transition-all">
                                    <span className="font-black text-slate-800 uppercase text-xs block">{c.name}</span>
                                    <i data-lucide="arrow-right" className="text-indigo-600"></i>
                                </button>
                            ))}
                        </div>
                    )}

                    {currentScreen === 'asist' && (
                        <div className="p-6 flex flex-col space-y-6 text-center">
                            <div className="bg-slate-900 aspect-square rounded-[40px] flex items-center justify-center shadow-2xl relative" onClick={() => handleScan(selectedCourse.students[Math.floor(Math.random() * selectedCourse.students.length)])}>
                                <i data-lucide="camera" size={64} className="text-indigo-400 opacity-40 animate-pulse"></i>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-white p-6 rounded-[32px] border"><p className="text-4xl font-black text-green-600">{sessionAttendance.length}</p><p className="text-[8px] font-black uppercase text-slate-400 mt-2">Presentes</p></div>
                                <div className="bg-white p-6 rounded-[32px] border"><p className="text-4xl font-black text-red-600">{selectedCourse.students.length - sessionAttendance.length}</p><p className="text-[8px] font-black uppercase text-slate-400 mt-2">Ausentes</p></div>
                            </div>
                            <button onClick={finalizeAttendance} className="w-full bg-indigo-700 text-white p-6 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl">Guardar Jornada</button>
                        </div>
                    )}

                    {currentScreen === 'sel-tp' && (
                        <div className="p-6 space-y-3">
                            {courses.map(c => (
                                <button key={c.id} onClick={() => { setSelectedCourse(c); setCurrentScreen('tp-list'); }} className="w-full bg-white p-6 rounded-[32px] flex justify-between items-center shadow-sm border active:scale-95 transition-all">
                                    <span className="font-black text-slate-800 uppercase text-xs">{c.name}</span><i data-lucide="clipboard-list" className="text-indigo-600"></i>
                                </button>
                            ))}
                        </div>
                    )}

                    {currentScreen === 'tp-list' && (
                        <div className="p-6 space-y-6 pb-20">
                            <div className="bg-white p-6 rounded-[32px] border shadow-lg space-y-4">
                                <div className="flex space-x-2">
                                    <input type="text" value={newTPName} onChange={e => setNewTPName(e.target.value)} placeholder="Nombre del TP..." className="flex-1 p-4 bg-slate-50 rounded-2xl font-bold border outline-none text-sm" />
                                    <button onClick={async () => {
                                        if (!newTPName) return;
                                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('assignments').add({ name: newTPName, courseId: selectedCourse.id, createdAt: new Date().toISOString() });
                                        setNewTPName(''); addNotification("TP Creado", "success");
                                    }} className="p-4 bg-indigo-600 text-white rounded-2xl"><i data-lucide="plus"></i></button>
                                </div>
                            </div>
                            {assignments.filter(a => a.courseId === selectedCourse.id).map(tp => (
                                <div key={tp.id} onClick={() => { setSelectedTP(tp); setCurrentScreen('tp-check'); }} className="bg-white p-5 rounded-[32px] border flex justify-between items-center cursor-pointer shadow-sm">
                                    <p className="font-black text-slate-800 text-[10px] uppercase">{tp.name}</p>
                                    <button onClick={(e) => { e.stopPropagation(); db.collection('artifacts').doc(appId).collection('public').doc('data').collection('assignments').doc(tp.id).delete(); }} className="text-slate-200 hover:text-red-500"><i data-lucide="trash-2"></i></button>
                                </div>
                            ))}
                        </div>
                    )}

                    {currentScreen === 'tp-check' && (
                        <div className="p-6 space-y-4 pb-20">
                            <div className="bg-indigo-50 p-5 rounded-3xl border border-indigo-100 flex justify-between items-center">
                                <p className="text-[10px] font-black text-indigo-600 uppercase tracking-widest">TP: {selectedTP.name}</p>
                                <span className="font-black text-indigo-700 text-lg">{deliveries.filter(d => d.assignmentId === selectedTP.id && d.status === 'Entregado').length} / {selectedCourse.students.length}</span>
                            </div>
                            <div className="space-y-2 max-h-[500px] overflow-y-auto scrollbar-hide px-1">
                                {selectedCourse.students.map(s => {
                                    const del = deliveries.find(d => d.assignmentId === selectedTP.id && d.studentName === s);
                                    const status = del ? del.status : 'Pendiente';
                                    return (
                                        <div key={s} className="bg-white p-4 rounded-2xl flex justify-between items-center border shadow-sm">
                                            <span className="font-black text-slate-700 text-[10px] uppercase truncate flex-1 leading-none">{s}</span>
                                            <button onClick={async () => {
                                                const deliveryId = `${selectedTP.id}_${s.replace(/\s+/g, '_')}`;
                                                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('deliveries').doc(deliveryId).set({ assignmentId: selectedTP.id, studentName: s, status: status === 'Entregado' ? 'Pendiente' : 'Entregado', updatedAt: new Date().toISOString() });
                                            }} className={`px-4 py-2 rounded-xl font-black text-[9px] uppercase shadow-sm transition-all ${status === 'Entregado' ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-red-50 text-red-500 border border-red-100'}`}>{status}</button>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const HomeCard = ({ icon, label, onClick, color = "text-slate-600" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return (
                <button onClick={onClick} className="flex flex-col items-center justify-center p-6 bg-white rounded-[32px] border border-slate-100 shadow-sm active:scale-95 transition-all cursor-pointer">
                    <div className={`${color} mb-3`}><i data-lucide={icon} size={32}></i></div>
                    <span className="text-[9px] font-black text-slate-700 uppercase tracking-widest text-center leading-none mt-1 italic">{label}</span>
                </button>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
